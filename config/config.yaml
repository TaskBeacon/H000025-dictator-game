subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
  - name: subname
    type: string
  - name: age
    type: int
    constraints:
      min: 5
      max: 80
  - name: gender
    type: choice
    choices:
      - Male
      - Female

subinfo_mapping:
  subject_id: Subject ID (3 digits)
  subname: Name
  age: Age
  gender: Gender
  Male: Male
  Female: Female
  Participant Information: Participant Information
  registration_failed: Registration failed
  registration_successful: Registration successful
  invalid_input: "{field} is invalid"

window:
  size: [1280, 720]
  units: pix
  screen: 0
  bg_color: gray
  fullscreen: true
  fullscreen_lock_escape: true
  monitor_width_cm: 35.5
  monitor_distance_cm: 60

task:
  task_name: dictator_game_preview
  save_path: ./outputs/human
  total_blocks: 2
  total_trials: 48
  trial_per_block: 24
  conditions: [low_stake, medium_stake, high_stake]
  key_list: ["f", "space", "j"]
  seed_mode: same_across_sub
  overall_seed: 2025
  delta: 1
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  input_mode: keyboard
  hide_cursor: true
  force_quit_enabled: true
  force_quit_shortcut: ctrl+q

timing:
  stake_prompt_duration: 0.6
  pre_decision_fixation_duration: 0.5
  decision_duration: 2.2
  choice_feedback_duration: 0.5
  outcome_feedback_duration: 1.0
  iti_duration: 0.8

stimuli:
  fixation:
    type: text
    text: "+"
    color: white
    height: 48
    font: SimHei

  instruction_text:
    type: text
    text: |
      Dictator Game

      On each trial, choose one allocation rule for the current stake:
      Left (F): Generous split (you 30%, other 70%)
      Middle (Space): Equal split (you 50%, other 50%)
      Right (J): Selfish split (you 90%, other 10%)

      Press Space to begin.
    color: white
    height: 28
    wrapWidth: 980
    font: SimHei

  stake_prompt_text:
    type: text
    text: |
      Current stake: {stake} points
      Condition: {condition_label}

      Get ready to make your allocation decision.
    color: white
    height: 34
    wrapWidth: 980
    font: SimHei

  decision_panel:
    type: text
    text: |
      Stake amount: {stake} points
      Left: Generous (you 30% / other 70%)
      Middle: Equal (you 50% / other 50%)
      Right: Selfish (you 90% / other 10%)
    color: white
    height: 34
    wrapWidth: 980
    font: SimHei

  decision_generous:
    type: text
    text: You chose: Generous allocation
    color: green
    height: 40
    font: SimHei

  decision_equal:
    type: text
    text: You chose: Equal allocation
    color: yellow
    height: 40
    font: SimHei

  decision_selfish:
    type: text
    text: You chose: Selfish allocation
    color: red
    height: 40
    font: SimHei

  decision_timeout:
    type: text
    text: No response. Equal allocation applied.
    color: white
    height: 38
    font: SimHei

  outcome_feedback:
    type: text
    text: |
      Stake: {stake} points
      Your choice: {choice_label}

      You receive: {self_amount} points
      Other receives: {other_amount} points
      Your cumulative: {self_total} points
      Other cumulative: {other_total} points
    color: white
    height: 32
    wrapWidth: 980
    font: SimHei

  block_break:
    type: text
    text: |
      Block {block_num}/{total_blocks} complete
      Generous rate: {generous_rate}
      Equal rate: {equal_rate}
      Selfish rate: {selfish_rate}
      Block you/other: {block_self_total}/{block_other_total} points
      Cumulative you/other: {self_total}/{other_total} points

      Press Space to continue.
    color: white
    height: 24
    wrapWidth: 980
    font: SimHei

  good_bye:
    type: text
    text: |
      Task complete
      Final you/other payoff: {self_total}/{other_total} points

      Press Space to exit.
    color: white
    height: 30
    wrapWidth: 980
    font: SimHei

triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    low_stake_prompt_onset: 20
    medium_stake_prompt_onset: 21
    high_stake_prompt_onset: 22
    low_stake_decision_onset: 30
    medium_stake_decision_onset: 31
    high_stake_decision_onset: 32
    decision_response: 50
    decision_timeout: 51
    choice_feedback_onset: 52
    outcome_feedback_onset: 53
    iti_onset: 60

  driver:
    type: serial_url
    url: loop://
    baudrate: 115200

  timing:
    post_delay_ms: 1

  policy:
    strict: false

controller:
  seed: 25025
  enable_logging: true
  allocation_profiles:
    generous:
      label: Generous allocation
      self_ratio: 0.3
    equal:
      label: Equal allocation
      self_ratio: 0.5
    selfish:
      label: Selfish allocation
      self_ratio: 0.9
  stake_levels:
    low_stake: 10
    medium_stake: 20
    high_stake: 30
